apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-app
  labels:
    app: ui-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ui-app
  template:
    metadata:
      labels:
        app: ui-app
    spec:
      containers:
      - name: ui-app
        image: kodekloud/webapp-color
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: ui-app-service
spec:
  type: LoadBalancer
  selector:
    app: ui-app
  ports:
  - port: 80
    targetPort: 8080
